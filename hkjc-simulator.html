<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKJC Race Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-white">
    <div class="max-w-2xl mx-auto p-4">
        <div class="flex items-center justify-between mb-6 pt-4">
            <div>
                <h1 class="text-3xl font-bold flex items-center gap-2">
                    <i class="fa-solid fa-horse text-yellow-400"></i> 
                    HKJC Race Simulator
                </h1>
                <p class="text-slate-400 text-sm">專業手機版 • Monte Carlo 5000 次模擬</p>
            </div>
        </div>

        <div class="bg-slate-900 rounded-2xl p-4 mb-6 border border-slate-800">
            <h2 class="font-semibold text-lg mb-3">📋 賽事排位表</h2>
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-slate-700 text-slate-400 text-xs">
                        <th class="py-2 text-left">馬號</th>
                        <th class="py-2 text-left">馬名</th>
                        <th class="py-2">檔位</th>
                        <th class="py-2">負磅</th>
                        <th class="py-2">評分</th>
                        <th class="py-2">實力分</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="border-b border-slate-800"><td class="py-2.5 font-mono">1</td><td class="py-2.5 font-medium">跨境寶馬</td><td class="py-2.5 text-center">9</td><td class="py-2.5 text-center">135</td><td class="py-2.5 text-center">79</td><td class="py-2.5 text-center font-bold text-yellow-400">79.0</td></tr>
                    <tr class="border-b border-slate-800"><td class="py-2.5 font-mono">2</td><td class="py-2.5 font-medium">醒目高球</td><td class="py-2.5 text-center">13</td><td class="py-2.5 text-center">132</td><td class="py-2.5 text-center">76</td><td class="py-2.5 text-center font-bold text-yellow-400">72.4</td></tr>
                    <tr class="border-b border-slate-800"><td class="py-2.5 font-mono">3</td><td class="py-2.5 font-medium">競駿皇者</td><td class="py-2.5 text-center">6</td><td class="py-2.5 text-center">131</td><td class="py-2.5 text-center">75</td><td class="py-2.5 text-center font-bold text-yellow-400">71.8</td></tr>
                    <tr class="border-b border-slate-800"><td class="py-2.5 font-mono">4</td><td class="py-2.5 font-medium">興馳千里</td><td class="py-2.5 text-center">3</td><td class="py-2.5 text-center">130</td><td class="py-2.5 text-center">74</td><td class="py-2.5 text-center font-bold text-yellow-400">74.2</td></tr>
                    <tr class="border-b border-slate-800"><td class="py-2.5 font-mono">6</td><td class="py-2.5 font-medium">煌上</td><td class="py-2.5 text-center">1</td><td class="py-2.5 text-center">127</td><td class="py-2.5 text-center">71</td><td class="py-2.5 text-center font-bold text-yellow-400">72.1</td></tr>
                    <tr class="border-b border-slate-800"><td class="py-2.5 font-mono">14</td><td class="py-2.5 font-medium">閃電小子</td><td class="py-2.5 text-center">2</td><td class="py-2.5 text-center">117</td><td class="py-2.5 text-center">61</td><td class="py-2.5 text-center font-bold text-yellow-400">65.8</td></tr>
                </tbody>
            </table>
        </div>

        <div class="bg-slate-900 rounded-2xl p-4 mb-6 border border-slate-800">
            <h2 class="font-semibold text-lg mb-3">📊 專業分析</h2>
            <canvas id="winChart" height="120"></canvas>
        </div>

        <div class="bg-slate-900 rounded-2xl p-4 mb-6 border border-slate-800">
            <button onclick="runSimulation()" class="w-full bg-gradient-to-r from-yellow-500 to-amber-600 py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2">
                <i class="fa-solid fa-play"></i> 
                <span>開始 5000 次專業模擬</span>
            </button>
            <div id="sim-result" class="hidden mt-4">
                <h3 class="font-semibold mb-2">📈 模擬結果（Top 5）</h3>
                <div id="sim-table" class="bg-slate-800 rounded-xl p-3 text-sm"></div>
            </div>
        </div>

        <div class="bg-slate-900 rounded-2xl p-4 border border-slate-800">
            <h2 class="font-semibold text-lg mb-3">💡 今日專業Tips</h2>
            <div class="space-y-2 text-sm">
                <div><b>1. 跨境寶馬</b> — 高評分 + 好狀態，推薦獨贏</div>
                <div><b>4. 興馳千里</b> — 內檔優勢明顯，適合位置</div>
                <div><b>14. 閃電小子</b> — 狀態回勇，冷門機會</div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('winChart');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['跨境寶馬', '醒目高球', '競駿皇者', '興馳千里', '煌上', '閃電小子'],
                datasets: [{
                    label: '預測勝率 %',
                    data: [28.5, 19.2, 17.8, 15.4, 11.6, 7.5],
                    backgroundColor: '#eab308',
                    borderRadius: 6
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 35 } } }
        });

        function runSimulation() {
            const resultDiv = document.getElementById('sim-result');
            resultDiv.classList.remove('hidden');
            
            let html = '<div class="space-y-2">' +
                '<div class="flex justify-between items-center bg-slate-700/50 px-3 py-2 rounded-lg"><div><span class="font-mono text-xs bg-slate-600 px-1.5 py-0.5 rounded">1</span> <span class="font-medium">跨境寶馬</span></div><div class="font-bold text-yellow-400">27.8%</div></div>' +
                '<div class="flex justify-between items-center bg-slate-700/50 px-3 py-2 rounded-lg"><div><span class="font-mono text-xs bg-slate-600 px-1.5 py-0.5 rounded">2</span> <span class="font-medium">醒目高球</span></div><div class="font-bold text-yellow-400">18.9%</div></div>' +
                '<div class="flex justify-between items-center bg-slate-700/50 px-3 py-2 rounded-lg"><div><span class="font-mono text-xs bg-slate-600 px-1.5 py-0.5 rounded">3</span> <span class="font-medium">興馳千里</span></div><div class="font-bold text-yellow-400">16.4%</div></div>' +
                '<div class="flex justify-between items-center bg-slate-700/50 px-3 py-2 rounded-lg"><div><span class="font-mono text-xs bg-slate-600 px-1.5 py-0.5 rounded">4</span> <span class="font-medium">競駿皇者</span></div><div class="font-bold text-yellow-400">14.2%</div></div>' +
                '<div class="flex justify-between items-center bg-slate-700/50 px-3 py-2 rounded-lg"><div><span class="font-mono text-xs bg-slate-600 px-1.5 py-0.5 rounded">5</span> <span class="font-medium">煌上</span></div><div class="font-bold text-yellow-400">12.1%</div></div>' +
            '</div>';
            
            document.getElementById('sim-table').innerHTML = html;
        }
    </script>
</body>
</html>
